<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Piano RGB - style Roblox</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #eee;
    }

    h1 {
      margin: 20px;
      text-shadow: 0 0 10px #f0f;
    }

    .controls {
      margin: 15px;
    }

    button {
      padding: 12px 24px;
      font-size: 1.1rem;
      margin: 0 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #444;
      color: white;
      transition: 0.3s;
    }

    button:hover { background: #666; }
    button.active { background: #e91e63; box-shadow: 0 0 15px #e91e63; }

    .piano {
      display: flex;
      position: relative;
      margin: 20px auto;
      user-select: none;
    }

    .key {
      position: relative;
      border: 1px solid #222;
      box-sizing: border-box;
      transition: all 0.08s ease;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
    }

    .white {
      width: 60px;
      height: 240px;
      background: linear-gradient(#fff 0%, #eee 50%, #ddd 100%);
      z-index: 1;
    }

    .black {
      width: 40px;
      height: 150px;
      background: #000;
      margin: 0 -20px;
      z-index: 2;
      border-radius: 0 0 12px 12px;
    }

    .key:active,
    .key.active {
      transform: translateY(6px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
    }

    /* Effet RGB glow */
    .key.glow-white::after,
    .key.glow-black::after {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffcc, #ffcc00, #ff3300, #cc00ff, #00ccff);
      background-size: 400%;
      filter: blur(12px);
      animation: rainbow 3s linear infinite;
      opacity: 0.9;
      z-index: -1;
      pointer-events: none;
    }

    .key.glow-white::before,
    .key.glow-black::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      z-index: -1;
    }

    @keyframes rainbow {
      0%   { background-position: 0% 50%; }
      100% { background-position: 400% 50%; }
    }

    /* Joue plus fort le glow sur black keys */
    .key.glow-black::after { filter: blur(16px); opacity: 1; }
  </style>
</head>
<body>

  <h1>Piano RGB 🔥</h1>

  <div class="controls">
    <button id="playBtn">Jouer la démo (autoplay)</button>
    <button id="stopBtn">Stop</button>
  </div>

  <div class="piano" id="piano"></div>

  <script>
    // Notes de base (C4 → C5)
    const baseNotes = [
      "C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B", "C5"
    ];

    // Mapping clavier ordinateur → index note
    const keyMap = {
      "a": 0,  // C
      "z": 1,  // C#
      "s": 2,  // D
      "e": 3,  // D#
      "d": 4,  // E
      "f": 5,  // F
      "t": 6,  // F#
      "g": 7,  // G
      "y": 8,  // G#
      "h": 9,  // A
      "u":10,  // A#
      "j":11,  // B
      "k":12,  // C5

      "q": 0, "2": 1, "w": 2, "3": 3, "e": 4,
      "r": 5, "5": 6, "t": 7, "6": 8, "y": 9,
      "7":10, "u":11, "i":12
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playNote(freq, duration = 0.6) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sawtooth"; // ou "square", "sine", "triangle"
      osc.frequency.value = freq;

      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    // Fréquences approximatives (C4 → C5)
    const frequencies = [
      261.63, 277.18, 293.66, 311.13, 329.63, 349.23,
      369.99, 392.00, 415.30, 440.00, 466.16, 493.88, 523.25
    ];

    // Création des touches
    const piano = document.getElementById("piano");

    for (let i = 0; i < 13; i++) {
      const key = document.createElement("div");
      key.classList.add("key");
      key.dataset.index = i;

      if ([1,3,6,8,10].includes(i)) {
        key.classList.add("black");
      } else {
        key.classList.add("white");
      }

      key.addEventListener("mousedown", () => pressKey(i, key));
      key.addEventListener("touchstart", e => {
        e.preventDefault();
        pressKey(i, key);
      });

      piano.appendChild(key);
    }

    function pressKey(index, elem) {
      if (!elem) {
        elem = document.querySelector(`.key[data-index="${index}"]`);
      }
      if (!elem) return;

      playNote(frequencies[index]);

      elem.classList.add("active", index % 2 === 0 ? "glow-white" : "glow-black");

      setTimeout(() => {
        elem.classList.remove("active", "glow-white", "glow-black");
      }, 400);
    }

    // Clavier physique
    document.addEventListener("keydown", e => {
      if (e.repeat) return;
      const idx = keyMap[e.key.toLowerCase()];
      if (idx !== undefined) {
        pressKey(idx);
      }
    });

    // ------------------- AUTOPLAY DEMO (style Roblox simple melody) -------------------
    const melody = [
      {note: 0, dur: 0.3},   // C
      {note: 0, dur: 0.3},
      {note: 2, dur: 0.3},   // D
      {note: 4, dur: 0.6},   // E longue
      {note: 4, dur: 0.3},
      {note: 2, dur: 0.3},   // D
      {note: 0, dur: 0.6},   // C longue

      {note: 0, dur: 0.3},
      {note: 0, dur: 0.3},
      {note: 2, dur: 0.3},
      {note: 4, dur: 0.6},
      {note: 4, dur: 0.3},
      {note: 2, dur: 0.3},
      {note: 7, dur: 0.9},   // G longue

      {note:12, dur: 0.4}, {note:11, dur: 0.2}, // C5 → B
      {note: 9, dur: 0.4}, {note: 7, dur: 0.4}, // A → G
      {note: 4, dur: 1.2},                      // E longue
    ];

    let autoplayInterval = null;

    function startAutoplay() {
      stopAutoplay();
      let i = 0;
      autoplayInterval = setInterval(() => {
        if (i >= melody.length) {
          i = 0; // boucle
        }
        const {note, dur} = melody[i];
        pressKey(note);

        i++;
      }, 300); // ≈ tempo 200 bpm
    }

    function stopAutoplay() {
      if (autoplayInterval) {
        clearInterval(autoplayInterval);
        autoplayInterval = null;
      }
    }

    document.getElementById("playBtn").onclick = startAutoplay;
    document.getElementById("stopBtn").onclick = stopAutoplay;

    // Option : démarrer auto au chargement (décommente si tu veux)
    // startAutoplay();
  </script>
</body>
</html>
