<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Roblox Piano avec Lettres sur Touches</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #eee;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #111;
      box-shadow: 0 4px 15px #000;
    }

    h1 {
      margin: 0;
      font-size: 2.3rem;
      background: linear-gradient(90deg, #ff3366, #33ccff, #ccff33);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .controls {
      padding: 15px;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    button, select {
      padding: 10px 18px;
      font-size: 1rem;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #444; }
    button.active { background: #ff3366; box-shadow: 0 0 20px #ff3366; }

    .piano-wrapper {
      overflow-x: auto;
      padding: 20px 0;
    }

    .piano {
      display: flex;
      height: 280px;
      position: relative;
      margin: 0 auto;
      width: fit-content;
      user-select: none;
    }

    .key {
      position: relative;
      border: 1px solid #222;
      box-sizing: border-box;
      border-radius: 0 0 12px 12px;
      transition: transform 0.07s, box-shadow 0.12s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #444;
      text-shadow: 0 0 5px rgba(0,0,0,0.8);
    }

    .white {
      width: 60px;
      height: 100%;
      background: linear-gradient(#fefefe, #c8c8c8, #aaa);
      z-index: 1;
      color: #222;
    }

    .black {
      width: 40px;
      height: 65%;
      background: #111;
      margin: 0 -20px;
      z-index: 10;
      border-radius: 0 0 16px 16px;
      color: #ccc;
    }

    .key.pressed {
      transform: translateY(10px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.8);
    }

    /* RGB glow */
    .key.glow::after {
      content: "";
      position: absolute;
      inset: -12px;
      background: conic-gradient(from var(--hue, 180deg), #ff00aa, #00ffff, #ffff00, #ff8800, #aa00ff, #00ff88);
      background-size: 300% 300%;
      filter: blur(20px);
      opacity: 0.7;
      animation: rotate 10s linear infinite;
      z-index: -1;
    }

    .key.glow {
      box-shadow: 0 0 35px var(--glow, #00ffff);
      border-color: var(--glow, #00ffff);
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<header>
  <h1>Roblox Piano - Lettres sur Touches</h1>
</header>

<div class="controls">
  <button id="playBtn">Jouer exemple</button>
  <button id="stopBtn">Stop</button>
</div>

<div class="piano-wrapper">
  <div class="piano" id="piano"></div>
</div>

<script>
// Mapping clavier Roblox / Virtual Piano style (QWERTY)
const keyBindings = [
  // Octave basse → haute (environ C3 à C7)
  {key: '1', isBlack: false, label: '1'},   // Très bas
  {key: 'q', isBlack: true,  label: 'Q'},
  {key: '2', isBlack: false, label: '2'},
  {key: 'w', isBlack: true,  label: 'W'},
  {key: '3', isBlack: false, label: '3'},
  {key: 'e', isBlack: true,  label: 'E'},
  {key: '4', isBlack: false, label: '4'},
  {key: 'r', isBlack: false, label: 'R'},
  {key: '5', isBlack: true,  label: 'T'},
  {key: 't', isBlack: false, label: 'T'},
  {key: '6', isBlack: true,  label: 'Y'},
  {key: 'y', isBlack: false, label: 'Y'},
  {key: 'u', isBlack: true,  label: 'U'},
  {key: '7', isBlack: false, label: '7'},
  {key: 'i', isBlack: true,  label: 'I'},
  {key: '8', isBlack: false, label: '8'},
  {key: 'o', isBlack: true,  label: 'O'},
  {key: '9', isBlack: false, label: '9'},
  {key: 'p', isBlack: true,  label: 'P'},
  {key: '0', isBlack: false, label: '0'},
  {key: '[', isBlack: false, label: '['},
  // Deuxième rangée (a → ')
  {key: 'a', isBlack: false, label: 'a'},
  {key: 's', isBlack: false, label: 's'},
  {key: 'd', isBlack: false, label: 'd'},
  {key: 'f', isBlack: false, label: 'f'},
  {key: 'g', isBlack: false, label: 'g'},
  {key: 'h', isBlack: false, label: 'h'},
  {key: 'j', isBlack: false, label: 'j'},
  {key: 'k', isBlack: false, label: 'k'},
  {key: 'l', isBlack: false, label: 'l'},
  {key: ';', isBlack: false, label: ';'},
  {key: '\'', isBlack: false, label: '\''},
  // Troisième rangée (z → /)
  {key: 'z', isBlack: false, label: 'z'},
  {key: 'x', isBlack: false, label: 'x'},
  {key: 'c', isBlack: false, label: 'c'},
  {key: 'v', isBlack: false, label: 'v'},
  {key: 'b', isBlack: false, label: 'b'},
  {key: 'n', isBlack: false, label: 'n'},
  {key: 'm', isBlack: false, label: 'm'},
  {key: ',', isBlack: false, label: ','},
  {key: '.', isBlack: false, label: '.'},
  {key: '/', isBlack: false, label: '/'}
];

const piano = document.getElementById("piano");
const keys = [];

keyBindings.forEach((bind, index) => {
  const keyEl = document.createElement("div");
  keyEl.classList.add("key", bind.isBlack ? "black" : "white");
  keyEl.textContent = bind.label;  // Affiche la lettre sur la touche !
  keyEl.dataset.index = index;
  keyEl.dataset.key = bind.key;

  keyEl.addEventListener("pointerdown", () => playKey(index, keyEl));

  piano.appendChild(keyEl);
  keys.push(keyEl);
});

// Audio synthétique simple
const ctx = new AudioContext();
function playKey(idx, elem) {
  const freq = 220 * Math.pow(2, idx / 12); // approx A3 base
  const osc = ctx.createOscillator();
  osc.type = "triangle";
  osc.frequency.value = freq;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.4, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);

  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.8);

  elem.classList.add("pressed");

  // Glow RGB selon position (hauteur)
  const hue = (idx / keys.length) * 360;
  elem.style.setProperty("--hue", hue + "deg");
  elem.style.setProperty("--glow", `hsl(${hue}, 100%, 65%)`);
  elem.classList.add("glow");

  setTimeout(() => {
    elem.classList.remove("pressed", "glow");
  }, 400);
}

// Support clavier (majuscules pour noires, minuscules/symboles pour blanches)
document.addEventListener("keydown", e => {
  if (e.repeat) return;
  let pressedKey = e.key;
  if (e.shiftKey) pressedKey = pressedKey.toUpperCase();

  const found = keyBindings.findIndex(b => b.key.toUpperCase() === pressedKey.toUpperCase());
  if (found !== -1) {
    playKey(found, keys[found]);
  }
});

// Exemple autoplay simple (Für Elise intro style Roblox)
document.getElementById("playBtn").onclick = () => {
  const seq = "e d# e d# e b d c a c e a b e g# b c e".split(" ");
  let i = 0;
  const id = setInterval(() => {
    if (i >= seq.length) return clearInterval(id);
    const letter = seq[i].toUpperCase();
    const found = keyBindings.findIndex(b => b.label.toUpperCase() === letter);
    if (found !== -1) playKey(found, keys[found]);
    i++;
  }, 180);
};

document.getElementById("stopBtn").onclick = () => {
  // Pas d'interval global ici, mais tu peux en ajouter si besoin
  alert("Arrêt (pas d'autoplay en cours ou réactualise la page)");
};

</script>
</body>
</html>
