<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Roblox Style Piano - RGB Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #ddd;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #111;
      box-shadow: 0 4px 15px #000;
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
      background: linear-gradient(90deg, #ff3366, #33ccff, #ccff33);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .controls {
      padding: 15px;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    button, select {
      padding: 10px 18px;
      font-size: 1rem;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #444; }
    button.active { background: #ff3366; box-shadow: 0 0 20px #ff3366; }

    .piano-wrapper {
      overflow-x: auto;
      padding: 20px 0;
    }

    .piano {
      display: flex;
      height: 260px;
      position: relative;
      margin: 0 auto;
      width: fit-content;
      user-select: none;
    }

    .key {
      position: relative;
      border: 1px solid #222;
      box-sizing: border-box;
      border-radius: 0 0 12px 12px;
      transition: transform 0.07s, box-shadow 0.12s;
    }

    .white {
      width: 58px;
      height: 100%;
      background: linear-gradient(#fefefe, #c8c8c8, #aaa);
      z-index: 1;
    }

    .black {
      width: 38px;
      height: 62%;
      background: #111;
      margin: 0 -19px;
      z-index: 10;
      border-radius: 0 0 16px 16px;
    }

    .key.pressed {
      transform: translateY(10px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.8);
    }

    /* RGB glow pro */
    .key.glow::after {
      content: "";
      position: absolute;
      inset: -10px;
      background: conic-gradient(from var(--hue, 180deg), #ff00aa, #00ffff, #ffff00, #ff8800, #aa00ff, #00ff88);
      background-size: 300% 300%;
      filter: blur(18px);
      opacity: 0.75;
      animation: rotate 8s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    .key.glow {
      box-shadow: 0 0 30px var(--glow, #00ffff);
      border-color: var(--glow, #00ffff);
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .sheet-editor {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
      background: #111;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 140px;
      background: #000;
      color: #0f8;
      font-family: monospace;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Roblox Piano RGB Pro</h1>
</header>

<div class="controls">
  <button id="playBtn">Jouer chanson</button>
  <button id="stopBtn">Stop</button>
  <select id="song">
    <option value="">Choisir une musique populaire Roblox...</option>
    <option value="rushe">Rush E</option>
    <option value="goldenhour">Golden Hour - JVKE</option>
    <option value="furelise">Für Elise</option>
    <option value="cupid">Cupid - FIFTY FIFTY</option>
    <option value="fnaf">FNAF Song</option>
  </select>
  <button id="playCustom">Jouer ta partition</button>
</div>

<div class="piano-wrapper">
  <div class="piano" id="piano"></div>
</div>

<div class="sheet-editor">
  <h3>Éditeur partition (modifie et joue !)</h3>
  <textarea id="customSheet">[r6] [t6] [y7] u y t r [e6] [r6] [t6] [y7] u y t r   // exemple Rush E début</textarea>
  <p style="color:#888; font-size:0.9rem;">Format Roblox-like : [a] = touche a, [Q] = touche noire Q, [r6] = r octave 6, etc. Espace = pause courte.</p>
</div>

<script>
// Mapping Roblox-like (QWERTY)
const keyMap = {
  // Blanches minuscules
  "a":0, "s":1, "d":2, "f":3, "g":4, "h":5, "j":6, "k":7, "l":8, ";":9, "'":10, "]":11,
  // Noires MAJUSCULES
  "Q":12, "W":13, "E":14,                  "T":15, "Y":16, "U":17, "I":18, "O":19, "P":20,
  // Octave +1 (z à , etc.)
  "z":12, "x":13, "c":14, "v":15, "b":16, "n":17, "m":18, ",":19, ".":20, "/":21
  // Ajoute plus si besoin (shift + lettres pour octaves sup)
};

const START_NOTE = 36; // C3 MIDI note
const keys = [];
const piano = document.getElementById("piano");

for (let i = 0; i < 36; i++) {  // ~3 octaves pleines + un peu plus
  const isBlackNote = [1,3,6,8,10].includes(i % 12);
  const key = document.createElement("div");
  key.classList.add("key", isBlackNote ? "black" : "white");
  key.dataset.index = i;
  key.dataset.midi = START_NOTE + i;

  key.addEventListener("pointerdown", () => playAndGlow(i));
  piano.appendChild(key);
  keys.push(key);
}

// Audio
const ctx = new AudioContext();
const analyser = ctx.createAnalyser();
analyser.fftSize = 1024;
const gainNode = ctx.createGain();
gainNode.gain.value = 0.4;
gainNode.connect(analyser);
analyser.connect(ctx.destination);

function playNote(midi, dur = 0.6) {
  const freq = 440 * Math.pow(2, (midi - 69) / 12);
  const osc = ctx.createOscillator();
  osc.type = "triangle"; // plus piano-like
  osc.frequency.value = freq;

  const env = ctx.createGain();
  env.gain.setValueAtTime(0.01, ctx.currentTime);
  env.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.02);
  env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);

  osc.connect(env).connect(gainNode);
  osc.start();
  osc.stop(ctx.currentTime + dur);
}

function playAndGlow(idx, vel = 0.9) {
  const midi = START_NOTE + idx;
  playNote(midi, 0.8);

  const key = keys[idx];
  key.classList.add("pressed");

  // RGB selon hauteur
  const hue = ((midi - START_NOTE) / 36) * 300; // bas rouge → haut violet/bleu
  key.style.setProperty("--hue", hue + "deg");
  key.style.setProperty("--glow", `hsl(${hue}, 100%, 60%)`);
  key.classList.add("glow");

  setTimeout(() => {
    key.classList.remove("pressed", "glow");
  }, 350);
}

// Clavier input
document.addEventListener("keydown", e => {
  if (e.repeat) return;
  const k = e.key.toUpperCase(); // support majuscules pour noires
  const low = e.key.toLowerCase();
  const idx = keyMap[k] ?? keyMap[low];
  if (idx !== undefined && idx < keys.length) {
    playAndGlow(idx);
  }
});

// Chansons (séquences Roblox-like simplifiées)
const songs = {
  rushe: "[r6][t6][y7] u y t r [e6][r6][t6][y7] u y t r [Q6][W6][E7] T E W Q [r5][t5][y6] u y t r [e5][r5][t5][y6] u y t r".split(" "),
  goldenhour: "[8j][8k][9l] [0;] [9k][8j] [7h][8j][9k] [0l][9k][8j] [7h][6g][7h] [8j][9k][0l]".split(" "),
  furelise: "[e6][d#6][e6][d#6][e6][b5][d6][c6][a5] [c6][e5][a5][b5] [e5][g#5][b5][c6][e6]".split(" "),
  cupid: "[0q][wr][ty][ui][op][a s] [d f][g h][j k][l ;] [tw][ey][ui][op][as]".split(" "),
  fnaf: "[8r][8t][9y][0u][9y][8t][7r][8r][9t][0y][9u][8y][7t] [6y][7u][8i][9o]".split(" ")
};

let interval = null;

function playSong(seq, speed = 140) {
  stopSong();
  let i = 0;
  interval = setInterval(() => {
    if (i >= seq.length) { stopSong(); return; }
    let note = seq[i].replace(/[\[\]]/g,"").trim();
    if (!note) { i++; return; }

    // Très simple parser Roblox-like
    const letter = note[0].toUpperCase();
    const oct = note.length > 1 ? parseInt(note[1]) : 5;
    const baseIdx = "ASDFGHJKL;']QWERTYUIOP".indexOf(letter);
    if (baseIdx === -1) { i++; return; }

    const idx = baseIdx + (oct - 3) * 12; // approx C3 base
    if (idx >= 0 && idx < keys.length) playAndGlow(idx);
    i++;
  }, speed);
}

function stopSong() {
  if (interval) clearInterval(interval);
  interval = null;
}

document.getElementById("playBtn").onclick = () => {
  const sel = document.getElementById("song").value;
  if (songs[sel]) playSong(songs[sel], sel === "rushe" ? 110 : 150);
};

document.getElementById("stopBtn").onclick = stopSong;

document.getElementById("playCustom").onclick = () => {
  const text = document.getElementById("customSheet").value.trim();
  if (!text) return;
  const seq = text.split(/\s+/);
  playSong(seq, 140);
};

</script>
</body>
</html>
