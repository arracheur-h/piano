<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Piano Pro RGB - Audio Reactif</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    header {
      padding: 20px;
      text-align: center;
      background: linear-gradient(180deg, #1a1a1a, #0d0d0d);
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
      background: linear-gradient(90deg, #00ffff, #ff00aa, #ffff00);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .controls {
      margin: 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      align-items: center;
    }

    button, select {
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2a2a2a;
      color: white;
      transition: all 0.2s;
    }

    button:hover, select:hover { background: #444; }
    button.active { background: #ff0066; box-shadow: 0 0 15px #ff0066; }

    .piano-container {
      position: relative;
      width: 100%;
      max-width: 1400px;
      overflow-x: auto;
      padding: 20px 0;
    }

    .piano {
      display: flex;
      position: relative;
      height: 280px;
      user-select: none;
    }

    .key {
      position: relative;
      box-sizing: border-box;
      border: 1px solid #111;
      border-radius: 0 0 10px 10px;
      transition: transform 0.08s, box-shadow 0.15s;
      overflow: hidden;
    }

    .white {
      width: 60px;
      height: 100%;
      background: linear-gradient(180deg, #f8f8f8, #d0d0d0);
      z-index: 1;
    }

    .black {
      width: 42px;
      height: 65%;
      background: #111;
      margin: 0 -21px;
      z-index: 2;
      border-radius: 0 0 14px 14px;
    }

    .key.pressed {
      transform: translateY(8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.7);
    }

    /* RGB audio reactif */
    .key.glow {
      box-shadow: 0 0 25px var(--glow-color, #00ffff);
      border-color: var(--glow-color, #00ffff);
    }

    .editor {
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0,255,255,0.1);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 1.1rem;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 6px;
      resize: vertical;
    }

    .help {
      font-size: 0.9rem;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>Piano RGB Audio-Réactif</h1>
</header>

<div class="controls">
  <button id="playDemo">Jouer démo</button>
  <button id="stopDemo">Stop</button>
  <select id="songSelect">
    <option value="">Choisir une chanson...</option>
    <option value="interstellar">Interstellar (simplifié)</option>
    <option value="gojo">Gojo Theme (JJK)</option>
    <option value="furelise">Für Elise (intro)</option>
  </select>
  <button id="playSheet">Jouer partition</button>
</div>

<div class="piano-container">
  <div class="piano" id="piano"></div>
</div>

<div class="editor">
  <h2>Éditeur de partition simple</h2>
  <textarea id="sheet" placeholder="Exemple : C4 D4 E4 F4 G4 A4 B4 C5 ... (notes en majuscules + numéro d'octave)"># Für Elise intro exemple
E5 D#5 E5 D#5 E5 B4 D5 C5 A4 
C5 E4 A4 B4 E4 G#4 B4 C5 E5
... modifie moi !"></textarea>
  <div class="help">Format : notes + octave (C4 = Do milieu). Sépare par espace. Supporte # pour dièse (ex: C#4). Tempo ~120 bpm.</div>
</div>

<script>
// ────────────────────────────────────────────────
// CONFIG
// ────────────────────────────────────────────────
const OCTAVES = 4;               // de C2 à C6 → 49 touches
const START_OCTAVE = 2;
const WHITE_WIDTH = 60;
const BLACK_WIDTH = 42;

const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
const isBlack = [false, true, false, true, false, false, true, false, true, false, true, false];

const keyMap = {}; // clavier → index
"awsedftgyhujkolp;['".split('').forEach((k,i)=> keyMap[k] = i); // A→; pour blanches + noires

const baseFreq = 65.41; // C2
function getFreq(index) {
  return baseFreq * Math.pow(2, index / 12);
}

// ────────────────────────────────────────────────
// AUDIO
// ────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();
analyser.fftSize = 2048;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

let masterGain = audioCtx.createGain();
masterGain.gain.value = 0.35;
masterGain.connect(analyser);
analyser.connect(audioCtx.destination);

function playNote(freq, duration = 0.6, velocity = 0.8) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sawtooth"; // ou "triangle" pour plus doux
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(velocity * 0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// ────────────────────────────────────────────────
// Création clavier
// ────────────────────────────────────────────────
const piano = document.getElementById("piano");
const keys = [];

for (let oct = START_OCTAVE; oct < START_OCTAVE + OCTAVES; oct++) {
  for (let i = 0; i < 12; i++) {
    const note = noteNames[i] + oct;
    const index = (oct - START_OCTAVE) * 12 + i;
    const key = document.createElement("div");
    key.classList.add("key", isBlack[i] ? "black" : "white");
    key.dataset.note = note;
    key.dataset.index = index;
    key.dataset.freq = getFreq(index);

    key.addEventListener("pointerdown", () => {
      playNote(getFreq(index), 1.2, 1);
      key.classList.add("pressed");
    });

    key.addEventListener("pointerup",  () => key.classList.remove("pressed"));
    key.addEventListener("pointerleave", () => key.classList.remove("pressed"));

    piano.appendChild(key);
    keys.push(key);
  }
}

// Clavier physique (A → P + dièses)
document.addEventListener("keydown", e => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  const idx = keyMap[k];
  if (idx !== undefined) {
    const keyEl = keys[idx];
    playNote(getFreq(idx), 1.2, 1);
    keyEl.classList.add("pressed");
  }
});

document.addEventListener("keyup", e => {
  const k = e.key.toLowerCase();
  const idx = keyMap[k];
  if (idx !== undefined) keys[idx].classList.remove("pressed");
});

// ────────────────────────────────────────────────
// RGB AUDIO VISUALIZER (réagit au son global)
// ────────────────────────────────────────────────
function updateVisualizer() {
  analyser.getByteFrequencyData(dataArray);

  let max = 0, sum = 0, count = 0;
  for (let i = 0; i < bufferLength; i++) {
    if (dataArray[i] > 40) {
      sum += dataArray[i];
      count++;
      if (dataArray[i] > max) max = dataArray[i];
    }
  }
  const avg = count > 0 ? sum / count : 0;
  const intensity = Math.min(1, avg / 180);

  // couleur dominante : basse → rouge, mid → vert, high → bleu
  let hue = 200 - (intensity * 200); // bleu → violet → rouge
  let sat = 90 + intensity * 10;
  let lit = 50 + intensity * 40;

  const color = `hsl(${hue}, ${sat}%, ${lit}%)`;

  keys.forEach(key => {
    if (key.classList.contains("pressed") || intensity > 0.15) {
      key.style.setProperty("--glow-color", color);
      key.classList.add("glow");
    } else {
      key.classList.remove("glow");
    }
  });

  requestAnimationFrame(updateVisualizer);
}
updateVisualizer();

// ────────────────────────────────────────────────
// Partition & Autoplay
// ────────────────────────────────────────────────
const songs = {
  interstellar: "C3 G3 Eb4 C4 G4 Eb5 C5 G5 Eb6 C6 G5 Eb5 C5 G4 Eb4 C4 G3 Eb4 C4".split(" "),
  gojo: "E4 G4 B4 E5 G5 B5 E6 B5 G5 E5 B4 G4 E4 B3 G3 E3".split(" "), // simplifié "If I Am With You" vibe
  furelise: "E5 D#5 E5 D#5 E5 B4 D5 C5 A4 C5 E4 A4 B4 E4 G#4 B4 C5 E5 E5 D#5 E5 D#5 E5 B4 D5 C5 A4 C5 E4 A4 B4 E4 C5 B4 A4".split(" ")
};

let autoplayId = null;

function playSequence(notes, delay = 180) {
  stopAutoplay();
  let i = 0;
  autoplayId = setInterval(() => {
    if (i >= notes.length) {
      stopAutoplay();
      return;
    }
    const note = notes[i].trim();
    if (!note) { i++; return; }

    const base = note.slice(0, -1).replace("#","s"); // C# → Cs pour simplicité
    const oct = parseInt(note.slice(-1));
    const nidx = noteNames.indexOf(base) + (oct - START_OCTAVE) * 12;

    if (nidx >= 0 && nidx < keys.length) {
      playNote(getFreq(nidx), 0.5, 0.9);
      keys[nidx].classList.add("pressed");
      setTimeout(() => keys[nidx].classList.remove("pressed"), 120);
    }
    i++;
  }, delay);
}

function stopAutoplay() {
  if (autoplayId) clearInterval(autoplayId);
  autoplayId = null;
}

// Démo random ou chanson
document.getElementById("playDemo").onclick = () => {
  const seq = [];
  for (let i = 0; i < 40; i++) seq.push(Math.floor(Math.random() * keys.length));
  playSequence(seq.map(i => noteNames[i%12] + (Math.floor(i/12)+START_OCTAVE)), 140);
};

document.getElementById("stopDemo").onclick = stopAutoplay;

document.getElementById("songSelect").onchange = e => {
  const val = e.target.value;
  if (songs[val]) playSequence(songs[val], 160);
};

document.getElementById("playSheet").onclick = () => {
  const text = document.getElementById("sheet").value.trim();
  if (!text) return;
  const notes = text.split(/[\s,]+/);
  playSequence(notes, 150);
};

</script>
</body>
</html>
